<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EcoGreen Admin — Reports & Volunteers</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💚</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
<script src="firebase-config.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --green:#1a6b3c;--green-light:#e8f5ee;--green-mid:#2d8653;
  --amber:#c97400;--amber-light:#fff7e6;
  --red:#b91c1c;--red-light:#fef2f2;
  --blue:#1a56a4;--blue-light:#eff6ff;
  --bg:#f5f7f5;--surface:rgba(255,255,255,0.8);--border:rgba(224,232,226,0.8);
  --text:#1a2e1f;--muted:#5a6e61;
  --radius:16px;--shadow:0 8px 32px rgba(0,40,20,0.08);
  --transition:0.3s ease;
}
/* Dark Mode */
[data-theme="dark"]{
  --green:#3ddc84;--green-light:rgba(61,220,132,0.1);--green-mid:#2fbc6e;
  --amber:#ffb74d;--amber-light:rgba(255,183,77,0.1);
  --red:#ef5350;--red-light:rgba(239,83,80,0.1);
  --blue:#64b5f6;--blue-light:rgba(100,181,246,0.1);
  --bg:#0a100d;--surface:rgba(20,30,24,0.4);--border:rgba(255,255,255,0.08);
  --text:#e0efe5;--muted:#8fa898;
  --shadow:0 8px 32px rgba(0,0,0,0.4);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:0;overflow-x:hidden;display:flex;flex-direction:column;}

/* Glowing Orbs for Dark Mode */
body::before, body::after {
  content: '';
  position: fixed;
  width: 60vw;
  height: 60vw;
  border-radius: 50%;
  filter: blur(140px);
  z-index: 0;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s;
}
body::before {
  top: -10vw;
  left: -10vw;
  background: radial-gradient(circle, rgba(61,220,132,0.2) 0%, rgba(0,0,0,0) 70%);
}
body::after {
  bottom: -10vw;
  right: -10vw;
  background: radial-gradient(circle, rgba(100,181,246,0.15) 0%, rgba(0,0,0,0) 70%);
}
[data-theme="dark"] body::before, [data-theme="dark"] body::after {
  opacity: 1;
}

.header, .main, .lock-screen, .footer { position: relative; z-index: 1; }

/* Header */
.header{background:var(--green);color:#fff;padding:0 24px;transition:background var(--transition);}
[data-theme="dark"] .header{background:#0d1f14;}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:64px;}
.logo{font-family:'Space Grotesk',sans-serif;font-size:1.3rem;font-weight:700;letter-spacing:-0.3px;}
.logo span{color:#7deba8;}
[data-theme="dark"] .logo span{color:var(--green);}
.header-actions{display:flex;align-items:center;gap:12px;}
.back-link{color:rgba(255,255,255,0.8);text-decoration:none;font-size:0.88rem;padding:8px 14px;border-radius:6px;transition:background 0.15s;}
.back-link:hover{background:rgba(255,255,255,0.15);color:#fff;}

/* Header Stat */
.header-stat{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.15);padding:6px 16px;border-radius:20px;border:1px solid rgba(255,255,255,0.1);margin:0 auto 0 24px;}
[data-theme="dark"] .header-stat{background:rgba(61,220,132,0.1);border-color:rgba(61,220,132,0.2);}
.header-stat .stat-num{font-family:'Space Grotesk',sans-serif;font-size:1.2rem;font-weight:700;color:#7deba8;line-height:1;}
[data-theme="dark"] .header-stat .stat-num{color:var(--green);}
.header-stat .stat-label{font-size:0.75rem;color:rgba(255,255,255,0.9);text-transform:uppercase;letter-spacing:1px;font-weight:600;}
[data-theme="dark"] .header-stat .stat-label{color:var(--text);}
@media(max-width:640px){
  .header-stat{padding:4px 10px; gap:4px; margin: 0 10px;}
  .header-stat .stat-num{font-size: 1rem;}
  .header-stat .stat-label{font-size: 0.65rem;}
  .header-inner {flex-wrap: wrap;}
}

/* Dark mode toggle */
.theme-toggle{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:24px;width:44px;height:26px;cursor:pointer;position:relative;transition:all 0.3s;flex-shrink:0;}
.theme-toggle::after{content:'☀️';position:absolute;top:2px;left:2px;width:22px;height:22px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:0.7rem;transition:all 0.3s;box-shadow:0 1px 4px rgba(0,0,0,0.2);}
[data-theme="dark"] .theme-toggle{background:rgba(61,220,132,0.2);border-color:rgba(61,220,132,0.3);}
[data-theme="dark"] .theme-toggle::after{content:'🌙';left:calc(100% - 24px);background:var(--surface);}

/* Lock screen */
.lock-screen{max-width:400px;margin:100px auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:40px;box-shadow:var(--shadow);text-align:center;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);animation:modalIn 0.4s ease;}
@keyframes modalIn{from{opacity:0;transform:scale(0.95) translateY(10px);}to{opacity:1;transform:scale(1) translateY(0);}}
.lock-screen h2{font-family:'Space Grotesk',sans-serif;font-size:1.5rem;margin-bottom:8px;}
.lock-screen p{font-size:0.9rem;color:var(--muted);margin-bottom:24px;}
.lock-input{width:100%;padding:14px 16px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:12px;font-size:1rem;font-family:inherit;text-align:center;letter-spacing:2px;transition:border-color 0.15s;}
.lock-input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(26,107,60,0.1);}
.lock-btn{width:100%;padding:14px;margin-top:16px;background:var(--green);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:600;cursor:pointer;font-family:inherit;transition:background 0.15s;}
.lock-btn:hover{background:var(--green-mid);transform:translateY(-1px);}
.lock-error{color:var(--red);font-size:0.85rem;margin-top:12px;display:none;font-weight:500;}

/* Main content */
.main{width:100%;max-width:100%;margin:0 auto;padding:20px;display:none;flex:1;flex-direction:column;}

/* Tabs */
.admin-tabs-container{margin:0;}
.admin-tabs{display:inline-flex;background:var(--surface);border-radius:50px;padding:8px;border:1px solid var(--border);box-shadow:var(--shadow);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);}
[data-theme="dark"] .admin-tabs{background:rgba(15,23,35,0.5);border-color:rgba(255,255,255,0.08);}
.admin-tab{padding:10px 24px;font-size:0.95rem;font-weight:600;color:var(--muted);cursor:pointer;border-radius:40px;border:none;background:transparent;transition:all 0.2s ease;}
.admin-tab.active{background:var(--green);color:#fff;}
.admin-tab:hover:not(.active){background:rgba(0,0,0,0.05);color:var(--text);}
[data-theme="dark"] .admin-tab:hover:not(.active){background:rgba(255,255,255,0.05);color:#fff;}

/* Dashboard Controls */
.dashboard-controls{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;gap:24px;}
.stats-strip{display:flex;flex-wrap:wrap;justify-content:center;gap:36px;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:50px;padding:14px 40px;box-shadow:var(--shadow);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);margin:0;}
.stat-card{display:flex;align-items:baseline;gap:12px;}
.stat-num{font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:700;color:var(--green);line-height:1;}
.stat-label{font-size:0.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:600;}

/* Section */
.admin-section{display:none;}
.admin-section.active{display:block;}

/* Report cards */
.report-list{display:flex;flex-direction:column;gap:20px;}
.report-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;box-shadow:var(--shadow);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);transition:transform 0.2s;}
.report-card:hover{transform:translateY(-2px);}
.report-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.report-location{font-weight:600;font-size:1.1rem;}
.report-time{font-size:0.8rem;color:var(--muted);}
.report-meta{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px;}
.report-badge{font-size:0.75rem;font-weight:600;padding:5px 14px;border-radius:20px;}
.report-badge.severity-low{background:var(--green-light);color:var(--green);}
.report-badge.severity-med{background:var(--amber-light);color:var(--amber);}
.report-badge.severity-high{background:var(--red-light);color:var(--red);}
.report-desc{font-size:0.95rem;color:var(--muted);line-height:1.6;margin-bottom:16px;}
.report-photos{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;}
.report-photos img{width:110px;height:110px;object-fit:cover;border-radius:12px;border:1px solid var(--border);cursor:pointer;transition:transform 0.15s;}
.report-photos img:hover{transform:scale(1.05);box-shadow:var(--shadow);}
.report-reporter{font-size:0.85rem;color:var(--muted);margin-bottom:16px;}
.report-actions{display:flex;gap:10px;flex-wrap:wrap;}

/* Buttons */
.btn{display:inline-block;padding:10px 18px;border-radius:10px;font-size:0.88rem;font-weight:600;cursor:pointer;text-decoration:none;border:none;font-family:inherit;transition:all 0.15s;}
.btn-green{background:var(--green);color:#fff;}
.btn-green:hover{background:var(--green-mid);transform:translateY(-1px);}
.btn-blue{background:var(--blue);color:#fff;}
.btn-blue:hover{background:#144a8f;transform:translateY(-1px);}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text);}
.btn-outline:hover{background:var(--bg);}
.btn-red{background:var(--red);color:#fff;}
.btn-red:hover{background:#991b1b;transform:translateY(-1px);}

/* Volunteer table */
.vol-table-wrapper{border-radius:var(--radius);overflow:auto;flex:1;width:100%;background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);display:flex;flex-direction:column;}
.vol-table{width:100%;min-width:900px;border-collapse:collapse;table-layout:fixed;flex:0 0 auto;}
.vol-table.empty-table{height:100%;flex:1;}
.vol-table th{background:rgba(0,0,0,0.03);font-size:0.82rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:16px 20px;text-align:left;border-bottom:1px solid var(--border);}
.vol-table th:nth-child(1){width:10%;}
.vol-table th:nth-child(2){width:13%;}
.vol-table th:nth-child(3){width:12%;}
.vol-table th:nth-child(4){width:15%;}
.vol-table th:nth-child(5){width:35%; text-align:center;}
.vol-table th:nth-child(6){width:15%;}
[data-theme="dark"] .vol-table th{background:rgba(255,255,255,0.03);}
.vol-table td{padding:16px 20px;font-size:0.95rem;border-bottom:1px solid var(--border);transition:background 0.15s;}
.vol-table tr:last-child td{border-bottom:none;}
.vol-table tr:hover td{background:var(--green-light);}

.empty-state{text-align:center;padding:60px 24px;color:var(--muted);font-size:1rem;}
.empty-state .icon{font-size:3rem;margin-bottom:16px;opacity:0.8;}

/* Image Modal */
.modal{display:none;position:fixed;z-index:9999;padding-top:100px;left:0;top:0;width:100%;height:100%;overflow:auto;background-color:rgba(0,0,0,0.8);backdrop-filter:blur(8px);}
.modal-content{margin:auto;display:block;max-width:90%;max-height:80%;border-radius:8px;box-shadow:0 10px 40px rgba(0,0,0,0.5);}
.modal-close{position:absolute;top:30px;right:40px;color:#f1f1f1;font-size:40px;font-weight:bold;transition:0.3s;cursor:pointer;}
.modal-close:hover,.modal-close:focus{color:#bbb;text-decoration:none;cursor:pointer;}

/* Footer */
.footer{background:var(--text);color:rgba(255,255,255,0.7);text-align:center;padding:12px 24px;font-size:0.8rem;margin-top:auto;transition:background var(--transition);}
[data-theme="dark"] .footer{background:#0a1210;}
.footer a{color:rgba(255,255,255,0.9);text-decoration:none;}

/* Responsive */
@media(max-width:1100px){
  .dashboard-controls{flex-direction:column;align-items:stretch;gap:16px;}
  .admin-tabs-container{text-align:center;}
}
@media(max-width:640px){
  .report-header{flex-direction:column;}
  .stats-strip{flex-direction:column;border-radius:24px;padding:16px 24px;align-items:flex-start;gap:12px;}
  .admin-tabs{width:90%;max-width:100%;overflow-x:auto;padding:6px;justify-content:flex-start;}
  .admin-tab{padding:8px 16px;font-size:0.85rem;}
  .vol-table-wrapper{overflow-x:auto;}
  .vol-table{font-size:0.85rem;}
  .vol-table th,.vol-table td{padding:12px 14px;}
  .report-card{padding:20px;}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo">Eco<span>Green</span> Admin</div>
    
    <div class="header-stat" id="headerStat" style="display:none;">
      <div class="stat-num" id="statReports">0</div>
      <div class="stat-label">People Reached</div>
    </div>

    <div class="header-actions">
      <a href="index.html" class="back-link">← Back to Dashboard</a>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode"></button>
    </div>
  </div>
</header>

<!-- Lock Screen -->
<div class="lock-screen" id="lockScreen">
  <h2>🔒 Admin Access</h2>
  <p>Enter the admin password to view reports and volunteer data.</p>
  <input type="password" class="lock-input" id="adminPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')unlockAdmin()">
  <button class="lock-btn" onclick="unlockAdmin()">Unlock</button>
  <div class="lock-error" id="lockError">Incorrect password. Try again.</div>
</div>

<!-- Main Admin Content (hidden until authenticated) -->
<div class="main" id="adminMain">
  <div class="vol-table-wrapper">
    <table class="vol-table" id="spreadsheetTable">
      <thead>
        <tr>
          <th>Date</th>
          <th>Name</th>
          <th>Contact</th>
          <th>Location</th>
          <th><div style="position:relative; left:-100px; display:inline-block;">Feedback</div></th>
          <th>Photos</th>
        </tr>
      </thead>
      <tbody id="reportList">
        <tr><td colspan="6"><div class="empty-state"><div class="icon">📭</div>Loading data...</div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Image Modal -->
<div id="imageModal" class="modal" onclick="closeModal(event)">
  <span class="modal-close" onclick="closeModal(event)">&times;</span>
  <img class="modal-content" id="modalImg">
</div>

<footer class="footer">
  <p>EcoGreen Admin Panel — Build with 💚 to keep Mumbai clean</p>
</footer>

<script>
/* ===== Dark Mode Logic ===== */
const themeToggle = document.getElementById('themeToggle');
const savedTheme = localStorage.getItem('ecotrack-theme');
if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
  document.documentElement.setAttribute('data-theme', 'dark');
}
themeToggle.addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme');
  const target = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', target);
  localStorage.setItem('ecotrack-theme', target);
});

/* ===== Admin Password ===== */
// CHANGE THIS PASSWORD to something secure!
const ADMIN_PASSWORD = 'ecotrack2026';

function unlockAdmin(){
  const input=document.getElementById('adminPass').value;
  if(input===ADMIN_PASSWORD){
    document.getElementById('lockScreen').style.display='none';
    document.getElementById('adminMain').style.display='flex';
    document.getElementById('headerStat').style.display='flex';
    sessionStorage.setItem('adminUnlocked','true');
    loadReports();
  }else{
    document.getElementById('lockError').style.display='block';
    document.getElementById('adminPass').value='';
    document.getElementById('adminPass').focus();
  }
}

// Auto-unlock if already authenticated this session
if(sessionStorage.getItem('adminUnlocked')==='true'){
  document.getElementById('lockScreen').style.display='none';
  document.getElementById('adminMain').style.display='flex';
  document.getElementById('headerStat').style.display='flex';
  // Load data after Firebase is ready
  setTimeout(()=>{loadReports();},500);
}

/* ===== Load Reports ===== */
async function loadReports(){
  try{
    const snap=await db.collection('reports').orderBy('timestamp','desc').get();
    const container=document.getElementById('reportList');
    const table=document.getElementById('spreadsheetTable');

    const statReportsEl = document.getElementById('statReports');
    if(statReportsEl) statReportsEl.textContent = snap.size;

    if(snap.empty){
      table.classList.add('empty-table');
      container.innerHTML='<tr><td colspan="6"><div class="empty-state"><div class="icon">📭</div>No data submitted yet.</div></td></tr>';
      return;
    }

    table.classList.remove('empty-table');
    let rows='';
    const docsToRender = snap.docs.slice(0, 50);
    docsToRender.forEach(doc=>{
      const d=doc.data();
      const id=doc.id;
      const photosLinks = (d.photoURLs||[]).map((url, i) => `<a href="#" onclick="openModal('${url}'); return false;" style="color:var(--blue);text-decoration:underline;margin-right:8px;white-space:nowrap;">View Image ${i+1}</a>`).join('<br>');
      
      const timeStr = d.timestamp ? d.timestamp.toDate().toLocaleString() : 'Just now';
      
      rows+=`
        <tr>
          <td><div style="font-size:0.8rem;color:var(--muted);">${timeStr}</div></td>
          <td><strong>${escHtml(d.reporterName||'Anonymous')}</strong></td>
          <td><span style="font-size:0.85rem;color:var(--muted);">${escHtml(d.contact||'—')}</span></td>
          <td>${escHtml(d.location)}</td>
          <td>${escHtml(d.feedback||d.description||'—')}</td>
          <td>${photosLinks||'—'}</td>
        </tr>`;
    });
    container.innerHTML=rows;

  }catch(e){
    console.error('Error loading reports:',e);
    document.getElementById('reportList').innerHTML='<div class="empty-state"><div class="icon">⚠️</div>Failed to load reports. Check Firebase configuration.</div>';
  }
}


/* ===== Modal Logic ===== */
function openModal(url) {
  document.getElementById('modalImg').src = url;
  document.getElementById('imageModal').style.display = 'block';
}

function closeModal(event) {
  if (event.target === document.getElementById('imageModal') || event.target.className === 'modal-close') {
    document.getElementById('imageModal').style.display = 'none';
    document.getElementById('modalImg').src = '';
  }
}

/* ===== Utility ===== */
function escHtml(str){
  const div=document.createElement('div');
  div.textContent=str||'';
  return div.innerHTML;
}
</script>
</body>
</html>
